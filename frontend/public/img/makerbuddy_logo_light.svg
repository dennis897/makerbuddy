<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 165 40" fill="none">
  <defs>
    <clipPath id="mb-clip-l">
      <circle cx="20" cy="20" r="18"/>
    </clipPath>
  </defs>

  <!-- Icon: green circle -->
  <circle cx="20" cy="20" r="18" fill="#00ae42"/>

  <!-- Subtle 3D-print layer lines inside circle -->
  <g clip-path="url(#mb-clip-l)">
    <rect x="2" y="25" width="36" height="2" fill="rgba(0,70,20,0.25)" rx="1"/>
    <rect x="2" y="20" width="36" height="2" fill="rgba(0,70,20,0.25)" rx="1"/>
    <rect x="2" y="15" width="36" height="2" fill="rgba(0,70,20,0.25)" rx="1"/>
  </g>

  <!-- M letterform -->
  <path d="M8,29 L8,12 L20,22 L32,12 L32,29"
        stroke="white" stroke-width="3.2"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- MakerBuddy wordmark (dark text for light background) -->
  <text x="46" y="20"
        font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="19" font-weight="700"
        dominant-baseline="central" letter-spacing="-0.3">
    <tspan fill="#009438">Maker</tspan><tspan fill="#1a1a1a">Buddy</tspan>
  </text>
</svg>
